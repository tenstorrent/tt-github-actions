# Example workflow for using the Copilot PR Type Labeler action.
#
# This file is for reference only - copy it into the adopting repository's
# .github/workflows/ directory (e.g. as label-prs-on-open.yml) and adjust as needed.
#
# Prerequisite (one-time, org admin): enable the organization Copilot policy
# "Allow use of Copilot CLI billed to the organization". No PAT or extra secret
# is needed - the built-in GITHUB_TOKEN authenticates Copilot.
#
# Design note: classifies once, when the PR is opened. It deliberately does NOT
# re-run on later pushes or at merge time, to keep cost bounded to one Copilot
# CLI call per PR. If a PR's scope changes significantly during review, the
# label can go stale - since it's a normal GitHub label, fix it by hand.

name: Label PRs by type on open

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write      # apply the label
  copilot-requests: write   # make the Copilot CLI request

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Classify and label PR
        uses: tenstorrent/tt-github-actions/.github/actions/copilot-pr-labeler@main
        # Optional inputs (defaults shown):
        # with:
        #   max_ai_credits: '50'
        #   fallback_label: 'chore'
